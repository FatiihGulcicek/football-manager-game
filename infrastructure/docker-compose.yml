version: '3.9'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_manager
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/football_manager
    ports:
      - '4000:4000'
    volumes:
      - .:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    command: pnpm --filter @football-manager/api dev

volumes:
  db_data:
